services:
  db:
    image: postgres:15-alpine
    container_name: snappaste-db
    environment:
      POSTGRES_DB: snappaste
      POSTGRES_USER: snappaste
      POSTGRES_PASSWORD: snappaste
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck: 
      test: ["CMD-SHELL", "pg_isready -U snappaste"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ../snappaste-backend
      dockerfile: Dockerfile
    container_name: snappaste-backend
    environment:
      DATABASE_URL: postgresql://snappaste:snappaste@db:5432/snappaste
      ENVIRONMENT: development
      ALLOWED_ORIGINS: '["http://localhost:5173","http://localhost:3000","http://localhost"]'
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    # Run migrations then start API
    command: >
      sh -c "alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload"

  frontend:
    build:
      context: ../snappaste-frontend
      dockerfile: Dockerfile
    container_name: snappaste-frontend
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  postgres_data:
