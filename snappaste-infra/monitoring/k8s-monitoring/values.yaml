# ──────────────────────────────────────────────
# k8s-monitoring — Grafana Alloy collectors
# Chart: grafana/k8s-monitoring
# Chart version: 3.8.4
#
# This is v3 — completely different values from v1.
# Installs: Alloy (metrics) + Alloy (logs) + kube-state-metrics + node-exporter
# ──────────────────────────────────────────────

cluster:
  name: snappaste-dev-eks   # identifies this cluster in all telemetry

# ── Where to send telemetry ──
destinations:
  - name: mimir
    type: prometheus
    url: http://mimir-nginx.monitoring.svc.cluster.local/api/prom/push

  - name: loki
    type: loki
    url: http://loki.monitoring.svc.cluster.local:3100/loki/api/v1/push

# ── What to collect and where to route ──
clusterMetrics:
  enabled: true
  destinations:
    - mimir

clusterEvents:
  enabled: true
  destinations:
    - loki

podLogs:
  enabled: true
  destinations:
    - loki

annotationAutodiscovery:
  enabled: true   # scrape pods with prometheus.io/scrape: "true" annotation
  destinations:
    - mimir

applicationObservability:
  enabled: false   # disable OpenTelemetry for now

# ── Alloy collector instances ──
alloy-metrics:
  enabled: true

alloy-logs:
  enabled: true

alloy-singleton:
  enabled: true

alloy-receiver:
  enabled: false

alloy-profiles:
  enabled: false
