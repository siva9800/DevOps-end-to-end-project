# ──────────────────────────────────────────────
# Loki — Log storage backed by S3
# Chart: grafana-community/loki  (OSS chart moved from grafana/ on Mar 16 2026)
# Chart version: 6.55.0  |  App version: Loki 3.6.7
#
# Before installing, get bucket name from Terraform:
#   terraform output loki_bucket_name
# ──────────────────────────────────────────────

deploymentMode: SingleBinary

singleBinary:
  replicas: 1

# Explicitly zero out all other deployment modes
read:
  replicas: 0
write:
  replicas: 0
backend:
  replicas: 0

loki:
  auth_enabled: false   # single-tenant mode

  commonConfig:
    replication_factor: 1

  # bucketNames lives here (NOT under s3)
  storage:
    type: s3
    bucketNames:
      chunks: snappaste-loki-dev-884337374668
      ruler: snappaste-loki-dev-884337374668
      admin: snappaste-loki-dev-884337374668
    s3:
      region: us-east-1

  schemaConfig:
    configs:
      - from: "2024-01-01"
        store: tsdb
        object_store: s3
        schema: v13
        index:
          prefix: loki_index_
          period: 24h

# Disable MinIO — using S3
minio:
  enabled: false

# Disable caches for dev (saves resources)
chunksCache:
  enabled: false
resultsCache:
  enabled: false

# Service account — must match Pod Identity association in Terraform
serviceAccount:
  name: loki
  annotations: {}   # Pod Identity uses agent, no annotation needed

# Disable self-monitoring to save resources
monitoring:
  selfMonitoring:
    enabled: false
    grafanaAgent:
      installOperator: false
  lokiCanary:
    enabled: false

test:
  enabled: false
