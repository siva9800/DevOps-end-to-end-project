# ──────────────────────────────────────────────
# Loki — Log storage backed by S3
# Chart: grafana/loki
#
# Before installing, get bucket name from Terraform:
#   terraform output snappaste-loki-dev-884337374668
#   terraform output loki_role_arn
# ──────────────────────────────────────────────

# Single binary mode — simple, 1 pod handles everything
deploymentMode: SingleBinary

singleBinary:
  replicas: 1

# S3 storage config
# Replace snappaste-loki-dev-884337374668 with: terraform output snappaste-loki-dev-884337374668
loki:
  auth_enabled: false   # single-tenant mode, no auth needed

  commonConfig:
    replication_factor: 1

  storage:
    type: s3
    s3:
      region: us-east-1
      bucketNames:
        chunks: snappaste-loki-dev-884337374668    # ← replace with terraform output
        ruler: snappaste-loki-dev-884337374668     # ← replace with terraform output
        admin: snappaste-loki-dev-884337374668     # ← replace with terraform output

  schemaConfig:
    configs:
      - from: "2024-01-01"
        store: tsdb
        object_store: s3
        schema: v13
        index:
          prefix: loki_index_
          period: 24h

# Service account — must match Pod Identity association in Terraform
serviceAccount:
  name: loki
  annotations: {}   # Pod Identity uses agent, no annotation needed

# Disable self-monitoring to save resources
monitoring:
  selfMonitoring:
    enabled: false
    grafanaAgent:
      installOperator: false
  lokiCanary:
    enabled: false

# Disable test pods
test:
  enabled: false
