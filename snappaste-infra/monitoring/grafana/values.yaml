# ──────────────────────────────────────────────
# Grafana — Visualization UI
# Chart: grafana-community/grafana  (moved from grafana/ on Jan 30 2026)
# Chart version: 10.5.15  |  App version: Grafana 12.3.1
# ──────────────────────────────────────────────

replicas: 1

adminUser: admin
adminPassword: snappaste-grafana-2024   # change before prod

persistence:
  enabled: true
  size: 2Gi
  storageClassName: gp2

# ── Pre-configure data sources ──
datasources:
  datasources.yaml:
    apiVersion: 1
    datasources:
      - name: Mimir
        type: prometheus
        url: http://mimir-nginx.monitoring.svc.cluster.local/prometheus
        isDefault: true
        jsonData:
          timeInterval: 60s

      - name: Loki
        type: loki
        url: http://loki-gateway.monitoring.svc.cluster.local
        jsonData:
          maxLines: 1000

# ── Pre-load dashboards ──
dashboardProviders:
  dashboardproviders.yaml:
    apiVersion: 1
    providers:
      - name: default
        type: file
        disableDeletion: false
        options:
          path: /var/lib/grafana/dashboards/default

dashboards:
  default:
    node-exporter:
      gnetId: 1860      # Node Exporter Full
      revision: 37
      datasource: Mimir
    k8s-global:
      gnetId: 15757     # Kubernetes / Views / Global
      revision: 37
      datasource: Mimir
    k8s-pods:
      gnetId: 15760     # Kubernetes / Views / Pods
      revision: 37
      datasource: Mimir
    k8s-logs-pod:
      gnetId: 15141     # Kubernetes / Logs / Pod
      revision: 1
      datasource: Loki
    k8s-logs-cluster:
      gnetId: 15142     # Kubernetes / Logs / Cluster
      revision: 1
      datasource: Loki

# ── Ingress — expose Grafana via shared ALB (same ALB as frontend/backend) ──
ingress:
  enabled: true
  ingressClassName: alb
  annotations:
    alb.ingress.kubernetes.io/scheme: internet-facing
    alb.ingress.kubernetes.io/target-type: ip
    alb.ingress.kubernetes.io/group.name: snappaste
    alb.ingress.kubernetes.io/group.order: "30"
  path: /grafana
  pathType: Prefix
  hosts:
    - ""

# Tell Grafana it's served under /grafana subpath
grafana.ini:
  server:
    root_url: "%(protocol)s://%(domain)s/grafana"
    serve_from_sub_path: true

resources:
  requests:
    cpu: 100m
    memory: 256Mi
  limits:
    cpu: 200m
    memory: 512Mi
