# ──────────────────────────────────────────────
# Grafana — Visualization UI
# Chart: grafana/grafana
# ──────────────────────────────────────────────

replicas: 1

# Admin credentials
# Change the password before deploying to prod
adminUser: admin
adminPassword: snappaste-grafana-2024   # change this

# Persist dashboards and settings
persistence:
  enabled: true
  size: 2Gi
  storageClassName: gp2

# ── Pre-configure data sources ──
datasources:
  datasources.yaml:
    apiVersion: 1
    datasources:
      - name: Mimir
        type: prometheus
        url: http://mimir-nginx.monitoring.svc.cluster.local/prometheus
        isDefault: true
        jsonData:
          timeInterval: 60s

      - name: Loki
        type: loki
        url: http://loki.monitoring.svc.cluster.local
        jsonData:
          maxLines: 1000

# ── Pre-load dashboards ──
dashboardProviders:
  dashboardproviders.yaml:
    apiVersion: 1
    providers:
      - name: default
        type: file
        disableDeletion: false
        options:
          path: /var/lib/grafana/dashboards/default

# Import community dashboards automatically
dashboards:
  default:
    node-exporter:
      gnetId: 1860      # Node Exporter Full — node CPU/memory/disk/network
      revision: 37
      datasource: Mimir
    k8s-global:
      gnetId: 15757     # Kubernetes / Views / Global — cluster-wide overview
      revision: 37
      datasource: Mimir
    k8s-pods:
      gnetId: 15760     # Kubernetes / Views / Pods — per-pod drill down
      revision: 37
      datasource: Mimir

# Resource limits
resources:
  requests:
    cpu: 100m
    memory: 256Mi
  limits:
    cpu: 200m
    memory: 512Mi
