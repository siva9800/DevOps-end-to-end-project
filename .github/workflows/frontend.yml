name: Frontend CI/CD

on:
  push:
    branches: [main]
    paths:
      - "snappaste-frontend/**"
      - ".github/workflows/frontend.yml"

  workflow_dispatch:
    inputs:
      environment:
        description: "Environment to deploy"
        required: true
        type: choice
        options: [dev, staging, prod]

env:
  AWS_REGION: us-east-1
  ECR_REPO: snappaste-frontend
  K8S_DEPLOYMENT: frontend
  K8S_CONTAINER: frontend
  K8S_NAMESPACE: snappaste

jobs:
  # ──────────────────────────────────────────────
  # Lint + Test
  # ──────────────────────────────────────────────
  lint-test:
    name: Lint & Test
    runs-on: [self-hosted, linux, x64]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: snappaste-frontend/package-lock.json

      - name: Install dependencies
        working-directory: snappaste-frontend
        run: npm ci

      - name: Lint
        working-directory: snappaste-frontend
        run: npm run lint

      - name: Type check
        working-directory: snappaste-frontend
        run: npx tsc --noEmit

      - name: Run Tests
        working-directory: snappaste-frontend
        run: npm run test

  # ──────────────────────────────────────────────
  # SonarQube — static code analysis (disabled for now)
  # ──────────────────────────────────────────────
  # sonarqube:
  #   name: SonarQube Scan
  #   runs-on: [self-hosted, linux, x64]
  #   needs: lint-test
  #
  #   steps:
  #     - name: Checkout
  #       uses: actions/checkout@v4
  #       with:
  #         fetch-depth: 0  # full history for better analysis
  #
  #     - name: SonarQube Scan
  #       uses: SonarSource/sonarqube-scan-action@v4
  #       with:
  #         projectBaseDir: snappaste-frontend
  #       env:
  #         SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
  #         SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}

  # ──────────────────────────────────────────────
  # Build → Trivy scan → Push to ECR
  # ──────────────────────────────────────────────
  build-push:
    name: Build & Push
    runs-on: [self-hosted, linux, x64]
    needs: lint-test
    outputs:
      image_tag: ${{ steps.tag.outputs.tag }}
      ecr_url: ${{ steps.ecr.outputs.url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set image tag
        id: tag
        run: echo "tag=sha-$(echo ${{ github.sha }} | cut -c1-7)" >> $GITHUB_OUTPUT

      - name: Get ECR URL
        id: ecr
        run: |
          ACCOUNT=$(aws sts get-caller-identity --query Account --output text)
          echo "url=${ACCOUNT}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com/${{ env.ECR_REPO }}" >> $GITHUB_OUTPUT

      - name: Login to ECR
        run: |
          aws ecr get-login-password --region ${{ env.AWS_REGION }} | \
          docker login --username AWS --password-stdin ${{ steps.ecr.outputs.url }}

      - name: Build Docker image
        working-directory: snappaste-frontend
        run: |
          docker build \
            --tag ${{ steps.ecr.outputs.url }}:${{ steps.tag.outputs.tag }} \
            --tag ${{ steps.ecr.outputs.url }}:latest \
            .

      - name: Trivy image scan
        run: |
          trivy image \
            --exit-code 1 \
            --severity HIGH,CRITICAL \
            --no-progress \
            ${{ steps.ecr.outputs.url }}:${{ steps.tag.outputs.tag }}
        # Fails pipeline if HIGH or CRITICAL CVEs found

      - name: Push to ECR
        run: |
          docker push ${{ steps.ecr.outputs.url }}:${{ steps.tag.outputs.tag }}
          docker push ${{ steps.ecr.outputs.url }}:latest

  # ──────────────────────────────────────────────
  # Deploy to EKS
  # ──────────────────────────────────────────────
  deploy:
    name: Deploy (${{ github.event.inputs.environment || 'dev' }})
    runs-on: [self-hosted, linux, x64]
    needs: build-push
    environment: ${{ github.event.inputs.environment || 'dev' }}

    env:
      TF_ENV: ${{ github.event.inputs.environment || 'dev' }}

    steps:
      - name: Configure kubectl
        run: |
          aws eks update-kubeconfig \
            --name snappaste-${{ env.TF_ENV }}-eks \
            --region ${{ env.AWS_REGION }}

      - name: Deploy to EKS
        run: |
          kubectl set image deployment/${{ env.K8S_DEPLOYMENT }} \
            ${{ env.K8S_CONTAINER }}=${{ needs.build-push.outputs.ecr_url }}:${{ needs.build-push.outputs.image_tag }} \
            -n ${{ env.K8S_NAMESPACE }}

      - name: Verify rollout
        run: |
          kubectl rollout status deployment/${{ env.K8S_DEPLOYMENT }} \
            -n ${{ env.K8S_NAMESPACE }} \
            --timeout=180s
