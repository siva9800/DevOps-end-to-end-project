name: Terraform Deploy

on:
  push:
    branches: [main]
    paths:
      - "snappaste-infra/terraform/**"

  workflow_dispatch:
    inputs:
      environment:
        description: "Environment to deploy"
        required: true
        type: choice
        options: [dev, staging, prod]

jobs:
  # ──────────────────────────────────────────────
  # fmt + validate — fast checks, no AWS needed
  # ──────────────────────────────────────────────
  validate:
    name: Validate
    runs-on: [self-hosted, linux, x64]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.11.1"

      - name: Terraform Format Check
        run: terraform fmt -check -recursive snappaste-infra/terraform/
        # Fails if any .tf file has wrong formatting
        # Fix locally with: terraform fmt -recursive snappaste-infra/terraform/

      - name: Terraform Validate (dev)
        working-directory: snappaste-infra/terraform/environments/dev
        run: |
          terraform init -backend=false
          terraform validate

      - name: Terraform Validate (staging)
        working-directory: snappaste-infra/terraform/environments/staging
        run: |
          terraform init -backend=false
          terraform validate

      - name: Terraform Validate (prod)
        working-directory: snappaste-infra/terraform/environments/prod
        run: |
          terraform init -backend=false
          terraform validate

  # ──────────────────────────────────────────────
  # Plan — shows what will change
  # ──────────────────────────────────────────────
  plan:
    name: Plan (${{ github.event.inputs.environment || 'dev' }})
    runs-on: [self-hosted, linux, x64]
    needs: validate

    env:
      TF_ENV: ${{ github.event.inputs.environment || 'dev' }}
      TF_VAR_github_runner_url: ${{ secrets.GH_RUNNER_URL }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.11.1"

      - name: Generate fresh GitHub Runner Token
        id: runner-token
        run: |
          TOKEN=$(gh api \
            --method POST \
            -H "Accept: application/vnd.github+json" \
            /repos/${{ github.repository }}/actions/runners/registration-token \
            --jq '.token')
          echo "token=$TOKEN" >> $GITHUB_OUTPUT
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        # Token is valid 1 hour — always generated fresh, never stored stale

      - name: Terraform Init
        working-directory: snappaste-infra/terraform/environments/${{ env.TF_ENV }}
        run: terraform init

      - name: Terraform Plan
        working-directory: snappaste-infra/terraform/environments/${{ env.TF_ENV }}
        env:
          TF_VAR_github_runner_token: ${{ steps.runner-token.outputs.token }}
        run: |
          set -o pipefail
          terraform plan -no-color -out=tfplan 2>&1 | tee plan_output.txt
        # set -o pipefail ensures pipeline fails if terraform fails, not just tee

      - name: Show Plan Summary
        working-directory: snappaste-infra/terraform/environments/${{ env.TF_ENV }}
        run: |
          echo "=========================================="
          echo "  PLAN SUMMARY — ${{ env.TF_ENV }}"
          echo "=========================================="
          grep -E "^Plan:|No changes|must be replaced" plan_output.txt || true

      - name: Upload Plan
        uses: actions/upload-artifact@v4
        with:
          name: tfplan-${{ env.TF_ENV }}
          path: snappaste-infra/terraform/environments/${{ env.TF_ENV }}/tfplan
          retention-days: 5
          # 5 days — enough time for approval even if you're away

  # ──────────────────────────────────────────────
  # Apply — gated by workflow_dispatch for staging/prod
  # For dev: runs automatically after plan
  # For staging/prod: only triggered manually via workflow_dispatch
  #
  # NOTE: GitHub Environment approval gate (required reviewers)
  # requires GitHub Pro for private repos.
  # Without Pro — use workflow_dispatch as your manual gate instead.
  # ──────────────────────────────────────────────
  apply:
    name: Apply (${{ github.event.inputs.environment || 'dev' }})
    runs-on: [self-hosted, linux, x64]
    needs: plan
    environment: ${{ github.event.inputs.environment || 'dev' }}
    # Set required reviewers in GitHub Settings → Environments
    # (requires GitHub Pro for private repos)

    env:
      TF_ENV: ${{ github.event.inputs.environment || 'dev' }}
      TF_VAR_github_runner_url: ${{ secrets.GH_RUNNER_URL }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.11.1"

      - name: Generate fresh GitHub Runner Token
        id: runner-token
        run: |
          TOKEN=$(gh api \
            --method POST \
            -H "Accept: application/vnd.github+json" \
            /repos/${{ github.repository }}/actions/runners/registration-token \
            --jq '.token')
          echo "token=$TOKEN" >> $GITHUB_OUTPUT
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Download Plan
        uses: actions/download-artifact@v4
        with:
          name: tfplan-${{ env.TF_ENV }}
          path: snappaste-infra/terraform/environments/${{ env.TF_ENV }}

      - name: Terraform Init
        working-directory: snappaste-infra/terraform/environments/${{ env.TF_ENV }}
        run: terraform init

      - name: Terraform Apply
        working-directory: snappaste-infra/terraform/environments/${{ env.TF_ENV }}
        env:
          TF_VAR_github_runner_token: ${{ steps.runner-token.outputs.token }}
        run: terraform apply -auto-approve tfplan
